<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hayatımdaki En Güzel Felaket</title>
    <style>
        :root {
            --bg-color: #ffeef2;
            --text-main: #6c4f57;
            --text-accent: #d63384;
            --rabbit-fur-1: #cfa88a;
            --rabbit-fur-2: #bfa38a;
            --rabbit-belly: #ffffff;
            --pink-blush: rgba(255, 182, 193, 0.6);
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 30%, #fff0f3 0%, #ffeef2 70%);
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
            color: var(--text-main);
            user-select: none;
        }

        /* --- Sahne Alanı --- */
        .scene {
            position: relative;
            width: 100%;
            max-width: 440px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 25px;
            padding-bottom: 10px;
        }

        .rabbit-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            width: 100%;
        }

        .rabbit {
            position: relative;
            width: 80px;
            height: 125px;
            background: var(--rabbit-fur-1);
            border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px rgba(108, 79, 87, 0.15);
        }

        /* Kulaklar */
        .rabbit::before, .rabbit::after {
            content: '';
            position: absolute;
            top: -55px;
            width: 20px;
            height: 65px;
            background: var(--rabbit-fur-1);
            border-radius: 50% 50% 40% 40%;
            transition: transform 1.2s ease;
        }
        
        .rabbit-left::before { left: 12px; transform: rotate(-8px); box-shadow: inset 0 8px 0 #fbc4c4; }
        .rabbit-left::after { right: 12px; transform: rotate(4px); box-shadow: inset 0 8px 0 #fbc4c4; }
        .rabbit-right::before { left: 12px; transform: rotate(-4px); box-shadow: inset 0 8px 0 #fbc4c4; }
        .rabbit-right::after { right: 12px; transform: rotate(8px); box-shadow: inset 0 8px 0 #fbc4c4; }

        .belly {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 70px;
            background: var(--rabbit-belly);
            border-radius: 50% 50% 45% 45%;
            opacity: 0.85;
        }

        .face {
            position: absolute;
            top: 25px;
            width: 100%;
            height: 40px;
        }

        .eye {
            position: absolute;
            top: 12px;
            width: 6px;
            height: 8px;
            background: #2b1f22;
            border-radius: 50%;
            transition: all 0.5s ease;
        }
        .rabbit-left .eye-left { left: 24px; }
        .rabbit-left .eye-right { right: 24px; }
        .rabbit-right .eye-left { left: 24px; }
        .rabbit-right .eye-right { right: 24px; }

        .nose {
            position: absolute;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 4px;
            background: #e29595;
            border-radius: 50% 50% 40% 40%;
        }

        /* Eller / Patiler */
        .paw {
            position: absolute;
            top: 65px;
            width: 35px;
            height: 16px;
            background: var(--rabbit-fur-1);
            border-radius: 12px;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            z-index: 6;
        }
        .rabbit-left .paw { right: -10px; transform: rotate(15px); transform-origin: left center; }
        .rabbit-right .paw { left: -10px; transform: rotate(-15px); transform-origin: right center; }

        .rabbit-left { margin-right: 50px; }
        .rabbit-right { background: var(--rabbit-fur-2); }
        .rabbit-right::before, .rabbit-right::after, .rabbit-right .paw { background: var(--rabbit-fur-2); }

        /* --- Sarılma ve Patilerin Tamamen Kenetlenme Hali --- */
        .scene.hugged .rabbit-left {
            transform: translateX(34px) rotate(3px);
        }

        .scene.hugged .rabbit-right {
            transform: translateX(-34px) rotate(-3px);
        }

        /* Patilerin birbirine değmesi */
        .scene.hugged .rabbit-left .paw {
            transform: rotate(-10px) scaleX(1.3);
            right: -24px;
        }

        .scene.hugged .rabbit-right .paw {
            transform: rotate(10px) scaleX(1.3);
            left: -24px;
        }

        .scene.hugged .eye {
            height: 2px;
            top: 15px;
            border-radius: 0;
        }

        /* --- Üst Pankart --- */
        .sun-pendant {
            position: absolute;
            bottom: 160px;
            background: #ffffff;
            color: #b73e5c;
            padding: 12px 26px;
            border-radius: 30px;
            font-size: 14.5px;
            font-weight: 600;
            letter-spacing: 0.3px;
            box-shadow: 0 12px 28px rgba(108, 79, 87, 0.12);
            border: 1px solid rgba(214, 51, 132, 0.15);
            opacity: 0;
            transform: translateY(15px) scale(0.9);
            transition: all 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
            z-index: 10;
        }

        .scene.hugged .sun-pendant {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* --- Yazım Kurallarına Uygun Metin --- */
        .quote-box {
            max-width: 85%;
            width: 520px;
            margin: 0 auto;
            min-height: 80px;
        }

        .quote-text {
            font-size: 20px;
            line-height: 1.7;
            color: var(--text-main);
            font-weight: 400;
            font-style: italic;
            text-shadow: 0 1px 1px rgba(255,255,255,0.8);
        }

        .quote-text::before, .quote-text::after {
            content: '"';
            color: var(--text-accent);
            font-size: 24px;
            font-weight: bold;
        }

        /* --- Yok Olan Aktivasyon Butonu --- */
        .confirm-wrapper {
            margin-top: 30px;
            height: 50px;
            transition: all 0.6s ease;
        }

        .confirm-wrapper.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
        }

        .confirm-label {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            padding: 12px 28px;
            border-radius: 30px;
            background: #ffffff;
            border: 1px solid rgba(108, 79, 87, 0.15);
            box-shadow: 0 4px 12px rgba(108, 79, 87, 0.05);
            transition: all 0.3s ease;
        }

        .confirm-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(108, 79, 87, 0.08);
            border-color: var(--text-accent);
        }

        .confirm-label input {
            display: none;
        }

        .checkbox-view {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(108, 79, 87, 0.3);
            border-radius: 6px;
            margin-right: 12px;
            position: relative;
            transition: all 0.3s ease;
        }

        .label-title {
            font-size: 15px;
            letter-spacing: 0.5px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* --- Yoğun Kalp Yağmuru --- */
        .falling-heart {
            position: fixed;
            color: #ff4d6d;
            font-size: 20px;
            pointer-events: none;
            animation: rainDown linear forwards;
            z-index: 100;
        }

        @keyframes rainDown {
            0% { transform: translateY(-5vh) rotate(0deg) scale(0.5); opacity: 0; }
            15% { opacity: 0.9; }
            100% { transform: translateY(105vh) rotate(360deg) scale(1.1); opacity: 0; }
        }
    </style>
</head>
<body onclick="playSoftMelody()">

    <!-- Ufak ve Hafif Romantik Melodi (Piyano Tınısı) -->
    <audio id="romantic-audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <!-- Sahne -->
    <div class="scene" id="canvas-stage">
        <div class="sun-pendant">Her gün bana güneş olduğunuz için teşekkürler! ☀️</div>
        
        <div class="rabbit-container">
            <!-- Sol Tavşan -->
            <div class="rabbit rabbit-left">
                <div class="belly"></div>
                <div class="face">
                    <div class="eye eye-left"></div>
                    <div class="eye eye-right"></div>
                    <div class="nose"></div>
                </div>
                <div class="paw"></div>
            </div>

            <!-- Sağ Tavşan -->
            <div class="rabbit rabbit-right">
                <div class="belly"></div>
                <div class="face">
                    <div class="eye eye-left"></div>
                    <div class="eye eye-right"></div>
                    <div class="nose"></div>
                </div>
                <div class="paw"></div>
            </div>
        </div>
    </div>

    <!-- Yazım Kurallarına Uygun Sinematik Aşk Sözü -->
    <div class="quote-box">
        <p class="quote-text">
            Sen benim hayatıma gelen en güzel, en tatlı felaketsin. Tüm ezberlerimi bozan, kalbimi ilk günkü gibi heyecanla çarptıran o eşsiz ritim sensin. İyi ki varsın ve iyi ki benim oldun.
        </p>
    </div>

    <!-- "Daha fazla aşk için dokunun" Bölümü -->
    <div class="confirm-wrapper" id="button-wrapper">
        <label class="confirm-label">
            <input type="checkbox" id="trigger-input" onchange="animateLove(this)">
            <div class="checkbox-view"></div>
            <span class="label-title">Daha fazla aşk için dokunun</span>
        </label>
    </div>

    <script>
        let isAudioPlaying = false;

        // Sayfa tıklandığında hafif fon piyanosunu çok kısık sesle başlatır
        function playSoftMelody() {
            if (!isAudioPlaying) {
                const audio = document.getElementById('romantic-audio');
                audio.volume = 0.15; // Sesi oldukça kısık tutarak rahatsız etmemesini sağladık
                audio.play().catch(e => console.log("Etkileşim bekleniyor..."));
                isAudioPlaying = true;
            }
        }

        function animateLove(checkbox) {
            const stage = document.getElementById('canvas-stage');
            const wrapper = document.getElementById('button-wrapper');
            
            if (checkbox.checked) {
                stage.classList.add('hugged');
                startDenseHeartRain();
                
                // Seçim yapıldıktan sonra kutucuğu yumuşakça tamamen gizler
                setTimeout(() => {
                    wrapper.classList.add('hidden');
                }, 400);
            }
        }

        function startDenseHeartRain() {
            const heartTypes = ['❤', '💖', '💗', '💕', '❣'];
            for (let i = 0; i < 65; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('falling-heart');
                    
                    heart.innerHTML = heartTypes[Math.floor(Math.random() * heartTypes.length)];
                    heart.style.left = Math.random() * 100 + 'vw';
                    
                    const size = Math.random() * 18 + 14;
                    heart.style.fontSize = size + 'px';
                    heart.style.animationDuration = (Math.random() * 2.5 + 2) + 's';
                    heart.style.opacity = Math.random() * 0.4 + 0.6;
                    
                    document.body.appendChild(heart);
                    
                    setTimeout(() => { heart.remove(); }, 4500);
                }, i * 80);
            }
        }
    </script>
</body>
</html>
